<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivy-Hive — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --beige:#F5EFE3;
    --cream:#FBF8F1;
    --sage:#A8B79A;
    --sage-soft:#C9D4BE;
    --sage-line:#D9E1CF;
    --forest:#3B5D42;
    --forest-deep:#2C4A33;
    --honey:#D9A24B;
    --honey-soft:#F1D9AC;
    --ink:#33402F;
    --ink-soft:#68765F;
    --ink-faint:#98A48D;
    --illus-sky:#EAE2CC;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;color:var(--ink);font-family:'Nunito',sans-serif;background:var(--beige);}
  h1,h2{font-family:'Fraunces',serif;font-weight:600;color:var(--forest-deep);margin:0;}
  button,input{font-family:inherit;}
  a{text-decoration:none;}
  :focus-visible{outline:3px solid var(--honey);outline-offset:2px;border-radius:6px;}

  .auth-wrap{display:flex;min-height:100vh;}

  .illustration-panel{flex:1 1 50%;position:relative;background:var(--illus-sky);overflow:hidden;min-height:340px;}
  .illustration-panel svg{width:100%;height:100%;display:block;}
  .illus-overlay{position:absolute;left:0;right:0;bottom:0;padding:38px 42px;background:rgba(44,74,51,0.86);color:var(--cream);}
  .illus-brand{display:flex;align-items:center;gap:10px;}
  .illus-brand span{font-family:'Fraunces',serif;font-size:19px;font-weight:600;}
  .illus-tagline{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:clamp(19px,2vw,24px);margin-top:14px;color:var(--cream);line-height:1.35;max-width:26ch;}

  .form-panel{flex:1 1 50%;background:var(--beige);display:flex;align-items:center;justify-content:center;padding:48px 32px;}
  .form-card{width:100%;max-width:392px;}

  .auth-tabs{display:flex;background:var(--cream);border:1px solid var(--sage-soft);border-radius:14px;padding:4px;margin-bottom:34px;}
  .auth-tabs a{flex:1;padding:10px;border-radius:10px;font-weight:800;font-size:14px;text-align:center;color:var(--ink-soft);transition:background .2s,color .2s;}
  .auth-tabs a.active{background:var(--forest);color:var(--cream);}

  .form-card h1{font-size:26px;}
  .form-sub{color:var(--ink-soft);font-size:14.5px;margin-top:8px;margin-bottom:28px;}

  .field{margin-bottom:18px;}
  .field label{display:block;font-size:13px;font-weight:800;color:var(--forest);margin-bottom:7px;}
  .input-wrap{position:relative;}
  .field input{width:100%;padding:12px 14px;border-radius:12px;border:1.6px solid var(--sage);background:var(--cream);font-size:14.5px;color:var(--ink);transition:border-color .2s, box-shadow .2s;}
  .field input::placeholder{color:var(--ink-faint);}
  .field input:focus{outline:none;border-color:var(--forest);box-shadow:0 0 0 3px rgba(59,93,66,0.12);}
  .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--ink-faint);display:flex;}
  .pw-toggle svg{width:18px;height:18px;}

  .agree-row{display:flex;align-items:center;gap:10px;margin:20px 0 24px;}
  .leaf-check{width:20px;height:20px;flex-shrink:0;border:none;background:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;}
  .leaf-check svg{width:18px;height:18px;}
  .leaf-check path{fill:none;stroke:var(--sage);stroke-width:1.6;transition:fill .2s ease, stroke .2s ease;}
  .leaf-check.checked path{fill:var(--sage);stroke:var(--sage);}
  .agree-row label{font-size:13.5px;color:var(--ink-soft);}
  .agree-row a{color:var(--forest);font-weight:800;text-decoration:none;}

  .btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--forest);color:var(--cream);font-weight:800;font-size:15px;cursor:pointer;transition:background .2s, transform .2s;}
  .btn-primary:hover{background:var(--forest-deep);transform:translateY(-1px);}

  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;}
  .divider .line{flex:1;height:1px;background:var(--sage-soft);}
  .divider span{font-size:12px;font-weight:800;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;}

  .btn-google{width:100%;padding:12px;border-radius:12px;border:1.4px solid var(--sage);background:var(--beige);color:var(--ink);font-weight:800;font-size:14.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;}
  .btn-google:hover{background:var(--sage-soft);}
  .btn-google svg{width:18px;height:18px;}

  .switch-line{text-align:center;margin-top:26px;font-size:13.5px;color:var(--ink-soft);}
  .switch-line a{color:var(--forest);font-weight:800;}

  @media (max-width:820px){
    .auth-wrap{flex-direction:column;}
    .illustration-panel{min-height:260px;}
    .form-panel{padding:40px 24px 60px;}
  }
</style>
</head>
<body>

<div class="auth-wrap">

  <div class="illustration-panel">
    <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="600" height="800" fill="#EAE2CC"/>
      <path d="M0 470 C 120 430, 260 460, 340 430 C 430 400, 520 440, 600 420 L600 800 L0 800 Z" fill="#D9E1CF"/>
      <path d="M0 560 C 140 520, 320 540, 460 515 C 520 505, 570 515, 600 510 L600 800 L0 800 Z" fill="#B9C7AB"/>
      <path d="M0 610 C 150 580, 340 600, 480 578 C 540 570, 580 578, 600 574 L600 800 L0 800 Z" fill="#A8B79A"/>
      <path d="M300 800 C 296 700, 320 650, 306 600 C 296 570, 312 560, 308 545" stroke="#D8C9A3" stroke-width="34" stroke-linecap="round" fill="none" opacity="0.8"/>
      <rect x="185" y="470" width="230" height="150" rx="6" fill="#EDE4CD" stroke="#C9B98C" stroke-width="2.5"/>
      <path d="M165 480 L300 380 L435 480 Z" fill="#8A6A45"/>
      <path d="M165 480 L300 380 L435 480 L435 495 L300 398 L165 495 Z" fill="#6E5233"/>
      <rect x="355" y="405" width="26" height="55" fill="#B9A17A" stroke="#8A6A45" stroke-width="2"/>
      <path d="M270 620 L270 555 C270 540 288 530 300 530 C312 530 330 540 330 555 L330 620 Z" fill="#3B5D42"/>
      <circle cx="318" cy="580" r="3" fill="#D9A24B"/>
      <circle cx="230" cy="530" r="24" fill="#EAE2CC" stroke="#8A6A45" stroke-width="4"/>
      <line x1="230" y1="506" x2="230" y2="554" stroke="#8A6A45" stroke-width="3"/>
      <line x1="206" y1="530" x2="254" y2="530" stroke="#8A6A45" stroke-width="3"/>
      <path d="M190 620 C 178 580, 200 560, 190 520 C 182 486, 200 470, 192 440 C 186 414, 205 400, 198 378" stroke="#3B5D42" stroke-width="4" fill="none" stroke-linecap="round"/>
      <g fill="#A8B79A" stroke="#3B5D42" stroke-width="1.4">
        <path d="M192 515C176 508 172 490 184 480C198 486 202 502 192 515Z"/>
        <path d="M190 466C174 460 170 444 182 434C196 440 200 454 190 466Z"/>
        <path d="M196 410C180 404 176 388 188 378C202 384 206 398 196 410Z"/>
        <path d="M188 570C172 566 166 550 178 540C192 546 196 560 188 570Z"/>
      </g>
      <path d="M405 615 C 420 578, 398 555, 410 518 C 420 488, 400 468, 412 436" stroke="#3B5D42" stroke-width="4" fill="none" stroke-linecap="round"/>
      <g fill="#A8B79A" stroke="#3B5D42" stroke-width="1.4">
        <path d="M408 512C424 506 430 490 418 480C404 486 400 500 408 512Z"/>
        <path d="M410 442C426 436 432 420 420 410C406 416 402 430 410 442Z"/>
      </g>
      <path d="M205 478C230 466 260 470 280 458" stroke="#3B5D42" stroke-width="3" fill="none" stroke-linecap="round"/>
      <g fill="#A8B79A" stroke="#3B5D42" stroke-width="1.2">
        <path d="M228 466C224 458 230 448 240 448C244 456 238 466 228 466Z"/>
        <path d="M260 460C256 452 262 442 272 442C276 450 270 460 260 460Z"/>
      </g>
      <g fill="#D9A24B"><circle cx="150" cy="640" r="4.5"/><circle cx="440" cy="650" r="4.5"/><circle cx="120" cy="690" r="4"/><circle cx="480" cy="700" r="4"/></g>
      <g fill="#F1D9AC"><circle cx="165" cy="655" r="3.5"/><circle cx="460" cy="670" r="3.5"/></g>
      <g transform="translate(468,600)">
        <path d="M-38 60 C -38 30 -30 -6 0 -30 C 30 -6 38 30 38 60 Z" fill="#D9A24B" stroke="#8A5A17" stroke-width="2.5"/>
        <path d="M-33 42 C -10 48 10 48 33 42" fill="none" stroke="#8A5A17" stroke-width="1.6" opacity="0.6"/>
        <path d="M-27 22 C -8 27 8 27 27 22" fill="none" stroke="#8A5A17" stroke-width="1.6" opacity="0.6"/>
        <path d="M-18 3 C -5 6 5 6 18 3" fill="none" stroke="#8A5A17" stroke-width="1.6" opacity="0.6"/>
        <ellipse cx="0" cy="60" rx="40" ry="7" fill="#8A6A45" opacity="0.35"/>
        <rect x="-7" y="42" width="14" height="18" rx="4" fill="#3B5D42"/>
      </g>
      <g transform="translate(505,555) rotate(-10)">
        <ellipse cx="0" cy="0" rx="8" ry="5.5" fill="#D9A24B"/>
        <path d="M-5 -2 L5 -2 M-4 2 L4 2" stroke="#3B5D42" stroke-width="1.6" stroke-linecap="round"/>
        <ellipse cx="4" cy="-5" rx="4.5" ry="3" fill="#FBF8F1" opacity="0.85"/>
      </g>
      <g transform="translate(430,530) rotate(14)">
        <ellipse cx="0" cy="0" rx="6" ry="4" fill="#D9A24B"/>
        <path d="M-4 -1.4 L4 -1.4 M-3 1.4 L3 1.4" stroke="#3B5D42" stroke-width="1.3" stroke-linecap="round"/>
      </g>
      <g stroke="#3B5D42" stroke-width="2.4" stroke-linecap="round" opacity="0.55">
        <path d="M90 720 C 92 706 88 700 84 690"/>
        <path d="M100 722 C 102 708 106 700 110 692"/>
        <path d="M520 730 C 522 716 518 710 514 700"/>
        <path d="M530 732 C 532 718 536 710 540 702"/>
      </g>
    </svg>

    <div class="illus-overlay">
      <div class="illus-brand">
        <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
          <polygon points="20,5 32,12 32,26 20,33 8,26 8,12" fill="#D9A24B"/>
          <ellipse cx="14" cy="17" rx="2.6" ry="1.6" fill="#FBF8F1" transform="rotate(-25 14 17)"/>
          <ellipse cx="14" cy="12" rx="2.6" ry="1.6" fill="#FBF8F1" transform="rotate(20 14 12)"/>
          <circle cx="15" cy="14.5" r="2.6" fill="#3B5D42"/>
          <path d="M27 32C22 34 17 30 18 24C19 18 14 16 15 10" stroke="#A8B79A" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Ivy-Hive</span>
      </div>
      <p class="illus-tagline">Grow your goals, one day at a time.</p>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-card">

      <div class="auth-tabs">
        <a href="signup.html">Sign up</a>
        <a href="login.html" class="active">Log in</a>
      </div>

      <h1>Welcome back</h1>
      <p class="form-sub">Your garden's been waiting. Let's see how it's grown.</p>

      <form onsubmit="return false;">
        <div class="field">
          <label for="li-email">Email</label>
          <input id="li-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="li-pw">Password</label>
          <div class="input-wrap">
            <input id="li-pw" type="password" placeholder="Your password" autocomplete="current-password">
            <button type="button" class="pw-toggle" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="row-between" style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 24px;">
          <div class="agree-row" style="margin:0;">
            <button type="button" class="leaf-check" aria-pressed="false" id="rememberCheck">
              <svg viewBox="0 0 20 20"><path d="M10 3C5 5 3 10 4 16C10 16 16 12 16 6C16 4 13 3 10 3Z"/></svg>
            </button>
            <label for="rememberCheck">Remember me</label>
          </div>
          <a href="#" style="font-size:13px;font-weight:800;color:var(--forest);">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Log in</button>
      </form>

      <div class="divider"><span class="line"></span><span>or</span><span class="line"></span></div>

      <button type="button" class="btn-google">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.5 29.6 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.5 29.6 3.5 24 3.5c-7.7 0-14.4 4.4-17.7 11.2z"/><path fill="#4CAF50" d="M24 44.5c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 35.7 27 36.5 24 36.5c-5.3 0-9.7-3.1-11.3-7.6l-6.6 5.1C9.5 40 16.1 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.9 2.5-2.6 4.6-4.7 6l6.6 5.4C40.9 37 44.5 31 44.5 24c0-1.2-.1-2.4-.3-3.5z"/></svg>
        Continue with Google
      </button>

      <p class="switch-line">New to Ivy-Hive? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.leaf-check').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const checked = btn.classList.toggle('checked');
      btn.setAttribute('aria-pressed', checked ? 'true':'false');
    });
  });
  document.querySelectorAll('.pw-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const input = btn.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });
</script>

</body>
</html>
